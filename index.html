<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>CHESS Navigator v1.1.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#020509 !important;color-scheme:dark}
body{background:#020509;color:#a0b8d0;font-family:'JetBrains Mono',monospace;font-size:12px;height:100vh;overflow:hidden;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:1fr 280px;grid-template-rows:40px 1fr;height:100vh}
header{grid-column:1/-1;background:linear-gradient(180deg,#0a1628,#060e1c);border-bottom:1px solid #152540;display:flex;align-items:center;padding:0 12px;gap:10px}
.logo{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;color:#fff}.logo span{color:#4ecfff}
.lsub{font-size:8px;color:#2a4868;letter-spacing:3px;text-transform:uppercase}
.hr{margin-left:auto;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ch{display:inline-flex;align-items:center;gap:3px;padding:1px 4px;border:1px solid #152540;font-size:7px;color:#4a6a8a;background:rgba(6,14,28,0.8)}
.cd{width:4px;height:4px;border-radius:50%}
.bh{background:none;border:1px solid #152540;color:#4a6a8a;font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 7px;cursor:pointer;letter-spacing:1px}
.bh:hover{border-color:#4ecfff;color:#4ecfff}
.gw{grid-column:1;grid-row:2;position:relative;overflow:hidden;background:#020509}
.gw svg{width:100%;height:100%;display:block}
.pl{position:absolute;top:6px;left:8px;font-size:8px;color:#2a4868;z-index:2}.pl b{color:#6a8aaa;font-weight:500}
.vt{position:absolute;top:6px;right:8px;font-size:8px;color:#2a4868;z-index:2}
.hb{position:absolute;bottom:6px;left:8px;background:rgba(6,12,22,0.95);border:1px solid #152540;padding:6px 10px;font-size:9px;color:#4a6a8a;max-width:260px;line-height:1.4;z-index:2}
.hb strong{color:#4ecfff}

/* RIGHT PANEL */
.rp{grid-column:2;grid-row:2;border-left:1px solid #152540;background:linear-gradient(180deg,#080f1e,#040810);display:flex;flex-direction:column;overflow:hidden}
.rs{border-bottom:1px solid #152540;padding:10px 12px}
.rs:last-child{border-bottom:none;flex:1;overflow-y:auto}
.rt{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#2a4868;margin-bottom:6px;font-weight:600}
.tn{font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:700;color:#dce8f4;margin-bottom:2px}
.tc{font-size:10px;margin-bottom:10px}
.sb{display:flex;align-items:flex-start;gap:7px;padding:7px 8px;border:1px solid #152540;background:rgba(10,18,32,0.7);color:#a0b8d0;font-size:9px;cursor:pointer;text-align:left;margin-bottom:4px;transition:border-color .15s}
.sb:hover{border-color:#4ecfff}
.sb.on{border-color:#4ecfff;background:rgba(78,207,255,0.05);color:#dce8f4}
.sb.off{opacity:.22;cursor:not-allowed;border-style:dashed}
.sb.off:hover{border-color:#152540}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:2px}
.sl{flex:1}.sld{font-size:8px;color:#2a4868;margin-top:1px;line-height:1.3}
.sk{font-size:7px;color:#2a4868;font-style:italic;flex-shrink:0}
.ir{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.il{font-size:8px;color:#4a6a8a;width:80px;flex-shrink:0;text-align:right}
.it{flex:1;height:3px;background:rgba(21,37,64,0.4);border-radius:1px;overflow:hidden}
.if{height:100%;border-radius:1px;transition:width .4s,background .3s}
.iv{font-size:8px;width:22px;text-align:right}
.pe{padding:4px 0;border-bottom:1px solid rgba(21,37,64,0.3);font-size:9px}
.pe:last-child{border-bottom:none}
.ps{color:#4ecfff;font-weight:600;margin-right:3px}
.pf{color:#2a4868;font-size:8px;margin-top:1px;padding-left:10px}

/* Legend */
.legend{position:absolute;bottom:6px;right:8px;display:flex;gap:8px;z-index:2;font-size:8px;color:#4a6a8a}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:6px;height:6px;border-radius:50%}
</style>

</head>

// Japan/Korea
"M 770,140 L 780,135 785,145 782,160 775,165 770,155 Z",
// Australia
"M 740,330 L 765,325 790,330 805,345 810,365 800,380 785,385 765,382 750,375 742,360 738,345 Z"
];

// ============================================================
// RENDER
// ============================================================
var NR=22; // node radius (smaller for 19 nodes)

function renderG(){
  var svg=document.getElementById("svg"),gw=document.getElementById("gw");
  var W=gw.clientWidth,H=gw.clientHeight;
  svg.innerHTML="";

  // ViewBox scaling for map
  var vw=1000,vh=600;
  var sx=W/vw,sy=H/vh;

  // BG
  svg.appendChild(sv("rect",{x:0,y:0,width:W,height:H,fill:"#020509"}));

  var defs=sv("defs",{});
  // Glow filter
  var gf=sv("filter",{id:"glow",x:"-50%",y:"-50%",width:"200%",height:"200%"});
  gf.appendChild(sv("feGaussianBlur",{"in":"SourceGraphic",stdDeviation:"8"}));
  defs.appendChild(gf);
  // Arrow active
  var ma=sv("marker",{id:"aA",viewBox:"0 0 10 7",refX:"9",refY:"3.5",markerWidth:"8",markerHeight:"6",orient:"auto"});
  ma.appendChild(sv("path",{d:"M 0 0 L 10 3.5 L 0 7 L 2.5 3.5 Z",fill:CA,opacity:"0.8"}));
  defs.appendChild(ma);
  // Arrow inactive
  var mi=sv("marker",{id:"aI",viewBox:"0 0 10 7",refX:"9",refY:"3.5",markerWidth:"8",markerHeight:"6",orient:"auto"});
  mi.appendChild(sv("path",{d:"M 0 0 L 10 3.5 L 0 7 L 2.5 3.5 Z",fill:"#1a3050",opacity:"0.5"}));
  defs.appendChild(mi);
  svg.appendChild(defs);

  // Draw map contours
  for(var m=0;m<MAP_PATHS.length;m++){
    // Scale path coordinates
    var pathStr=MAP_PATHS[m].replace(/(\d+\.?\d*),(\d+\.?\d*)/g,function(match,x,y){
      return (parseFloat(x)*sx)+","+(parseFloat(y)*sy);
    });
    svg.appendChild(sv("path",{d:pathStr,fill:"none",stroke:"#0e1e30","stroke-width":"1.2",opacity:"0.5"}));
    svg.appendChild(sv("path",{d:pathStr,fill:"#060d18",opacity:"0.3"}));
  }

  // Compute node pixel positions
  var nodePos={};
  for(var i=0;i<T.length;i++){
    var t=T[i];
    if(t.geo){
      nodePos[t.id]={x:t.px*W,y:t.py*H};
    } else {
      nodePos[t.id]={x:t.ox*W,y:t.oy*H};
    }
  }

  // Draw edges
  for(var e=0;e<EDGES.length;e++){
    var edge=EDGES[e];
    var fp=nodePos[edge.f],tp=nodePos[edge.t];
    if(!fp||!tp)continue;
    var dx=tp.x-fp.x,dy=tp.y-fp.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1)continue;
    var ux=dx/dist,uy=dy/dist;
    var ssx=fp.x+ux*(NR+4),ssy=fp.y+uy*(NR+4);
    var eex=tp.x-ux*(NR+6),eey=tp.y-uy*(NR+6);

    // Check if any precondition on target references source
    var act=false;
    // Edge is "active" if both endpoints are above S1
    var srcLv=G[edge.f],tgtLv=G[edge.t];
    if(srcLv>=2||tgtLv>=2)act=true;

    // Curve: perpendicular offset
    var px=-uy,py=ux;
    var curveAmt=Math.min(dist*0.15,30);
    var mx=(ssx+eex)/2+px*curveAmt,my=(ssy+eey)/2+py*curveAmt;
    var pathD="M "+ssx+" "+ssy+" Q "+mx+" "+my+" "+eex+" "+eey;

    if(act){
      svg.appendChild(sv("path",{d:pathD,stroke:CA,"stroke-width":"4",fill:"none",opacity:"0.06"}));
    }

    svg.appendChild(sv("path",{
      d:pathD,
      stroke:act?CA:"#1a3050",
      "stroke-width":act?"1.5":"0.8",
      "stroke-dasharray":act?"none":"3 3",
      opacity:act?"0.6":"0.35",
      fill:"none",
      "marker-end":act?"url(#aA)":"url(#aI)"
    }));

    // Edge label (only on hover/active -- skip for cleanliness with 40 edges)
    if(act){
      var lx=(ssx+eex)/2+px*(curveAmt+8),ly=(ssy+eey)/2+py*(curveAmt+8);
      var lt=sv("text",{x:lx,y:ly,"text-anchor":"middle","font-family":"'JetBrains Mono',monospace","font-size":"6",fill:CA,opacity:"0.5"});
      lt.textContent=edge.lb;
      svg.appendChild(lt);
    }
  }

  // Draw nodes
  for(var n=0;n<T.length;n++){
    var t=T[n],p=nodePos[t.id];
    var lv=G[t.id],col=sc(lv),isSel=(sel===t.id);
    var isOrb=!t.geo;

    var g=sv("g",{cursor:"pointer"});
    g.onclick=(function(tid){return function(){selectT(tid)}})(t.id);

    // Glow
    g.appendChild(sv("circle",{cx:p.x,cy:p.y,r:NR+10,fill:col,opacity:"0.04",filter:"url(#glow)"}));

    // Outer ring
    g.appendChild(sv("circle",{cx:p.x,cy:p.y,r:NR+4,fill:"none",stroke:col,
      "stroke-width":isSel?"1.5":"0.6",opacity:isSel?"0.5":"0.2",
      "stroke-dasharray":isOrb?"2 2":"none"}));

    // Main circle
    g.appendChild(sv("circle",{cx:p.x,cy:p.y,r:NR,
      fill:isSel?"#0c1828":"#060d18",stroke:col,
      "stroke-width":isSel?"2.5":"1.5"}));

    // Label
    var tl=sv("text",{x:p.x,y:p.y-3,"text-anchor":"middle",
      "font-family":"'DM Sans',sans-serif","font-size":"8","font-weight":"700",fill:"#dce8f4"});
    tl.textContent=t.s;
    g.appendChild(tl);

    // Scenario label
    var slab=sv("text",{x:p.x,y:p.y+8,"text-anchor":"middle",
      "font-family":"'JetBrains Mono',monospace","font-size":"6",fill:col,opacity:"0.8"});
    slab.textContent="S"+lv;
    g.appendChild(slab);

    // Wedge indicator
    var wc={"MIL":"#ff6688","ENE":"#ffaa44","FIN":"#44aaff","HYB":"#aa66ff","POL":"#66ddaa","TEC":"#ff66dd"};
    g.appendChild(sv("circle",{cx:p.x+NR-2,cy:p.y-NR+2,r:3,fill:wc[t.w]||"#888",opacity:"0.7"}));

    svg.appendChild(g);
  }
}

function renderTP(){
  var c=document.getElementById("tp");
  if(!sel){c.innerHTML='<span style="color:#2a4868;font-size:9px">Click a node</span>';return}
  var t=null;for(var i=0;i<T.length;i++)if(T[i].id===sel)t=T[i];
  if(!t)return;
  var cur=G[t.id];
  var h='<div class="tn">'+t.n+'</div>';
  h+='<div class="tc" style="color:'+sc(cur)+'">'+t.sc[cur-1].l+'</div>';
  for(var s=0;s<t.sc.length;s++){
    var sc2=t.sc[s],sl=s+1,av=avail(t,sl),ic=(sl===cur);
    var cls="sb";if(ic)cls+=" on";if(!av&&!ic)cls+=" off";
    h+='<div class="'+cls+'" onclick="applyT(\''+t.id+'\','+sl+')">';
    h+='<div class="sd" style="background:'+sc(sl)+'"></div>';
    h+='<div class="sl"><div>'+sc2.l+'</div><div class="sld">'+sc2.d+'</div></div>';
    if(!av&&!ic&&sc2.pt)h+='<div class="sk">\uD83D\uDD12 '+sc2.pt+'</div>';
    h+='</div>';
  }
  c.innerHTML=h;
}

function renderImp(){
  var a=agg(),c=document.getElementById("imp"),h="";
  for(var i=0;i<IK.length;i++){
    var k=IK[i],v=a[k.k],p=Math.min(100,(v/5)*100);
    var col=v===0?"#1a3050":v<=2?C1:v<=3?C2:C3;
    h+='<div class="ir"><div class="il">'+k.n+'</div>';
    h+='<div class="it"><div class="if" style="width:'+p+'%;background:'+col+'"></div></div>';
    h+='<div class="iv" style="color:'+col+'">'+v+'/5</div></div>';
  }
  c.innerHTML=h;
}

function renderHdr(){
  var h="";for(var i=0;i<T.length;i++){
    var t=T[i],lv=G[t.id];
    if(lv>1)h+='<div class="ch"><div class="cd" style="background:'+sc(lv)+'"></div>'+t.s+':S'+lv+'</div>';
  }
  if(!h)h='<span style="font-size:8px;color:#2a4868">All S1</span>';
  document.getElementById("hc").innerHTML=h;
}

function renderPos(){
  var ct=0;for(var i=0;i<T.length;i++)if(G[T[i].id]>1)ct++;
  document.getElementById("pl").innerHTML="<b>"+ct+"</b>/19 topics escalated";
}

function renderPL(){
  var c=document.getElementById("plog");
  if(!plog.length){c.innerHTML='<span style="color:#2a4868;font-size:9px">No transitions yet.</span>';return}
  var h="";for(var i=0;i<plog.length;i++){
    var e=plog[i];h+='<div class="pe"><span class="ps">'+(i+1)+'.</span>'+e.t+' S'+e.f+'\u2192S'+e.to;
    for(var j=0;j<e.fx.length;j++)h+='<div class="pf">\u21B3 '+e.fx[j]+'</div>';
    h+='</div>';
  }
  c.innerHTML=h;
}

function R(){renderG();renderTP();renderImp();renderHdr();renderPos();renderPL()}

function selectT(id){sel=id;R()}

function applyT(id,nl){
  var cur=G[id];if(nl===cur)return;
  var t=null;for(var i=0;i<T.length;i++)if(T[i].id===id)t=T[i];
  if(!t||!avail(t,nl))return;
  var snap={};for(var k in G)snap[k]=G[k];
  hist.push({s:snap,pl:plog.length});
  var prev={};for(var k in G)prev[k]=G[k];
  G[id]=nl;
  var eqC=eq(),fx=[];
  for(var i=0;i<T.length;i++){
    var tt=T[i];if(tt.id===id)continue;
    for(var s=0;s<tt.sc.length;s++){
      var sc2=tt.sc[s];
      if(sc2.pc&&avail(tt,s+1)&&!sc2.pc(prev))
        fx.push("\uD83D\uDD13 "+tt.s+" "+sc2.l+" available");
    }
  }
  for(var i=0;i<eqC.length;i++)
    fx.push("\u26A0 "+eqC[i].t.s+" forced S"+eqC[i].f+"\u2192S"+eqC[i].to);
  plog.push({t:t.s,f:cur,to:nl,fx:fx});
  R();
}

function reset(){G={};for(var i=0;i<T.length;i++)G[T[i].id]=1;sel=null;plog=[];hist=[];R()}
function undo(){if(!hist.length)return;var p=hist.pop();G=p.s;plog.length=p.pl;R()}

window.addEventListener("resize",R);
R();
</script>
